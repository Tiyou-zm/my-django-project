<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑主题</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #f5f5f7;
            color: #1d1d1f;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem;
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.07);
            margin-top: 2rem;
            margin-bottom: 2rem;
        }

        .header {
            text-align: center;
            padding: 2rem 0;
            border-bottom: 1px solid #d2d2d7;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #1d1d1f;
            margin: 0;
        }

        .form-section {
            padding: 2rem 0;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 0.5rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d2d2d7;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            box-sizing: border-box;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #007aff;
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
        }

        .submit-btn {
            background-color: #007aff;
            color: #ffffff;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 4px rgba(0, 122, 255, 0.2);
        }

        .submit-btn:hover {
            background-color: #0056cc;
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(0, 122, 255, 0.3);
        }

        .back-link {
            display: inline-block;
            color: #007aff;
            text-decoration: none;
            font-weight: 500;
            margin-top: 1rem;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .container {
                margin: 1rem;
                padding: 1.5rem;
            }

            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>编辑主题</h1>
        </header>

        <main class="form-section">
            <form action="{% url 'learning_logs:edit_topic' topic.id %}" method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label for="{{ form.text.id_for_label }}">主题名称:</label>
                    {{ form.text }}
                </div>
                <button type="submit" class="submit-btn">保存更改</button>
            </form>

            <a href="{% url 'learning_logs:topic' topic.id %}" class="back-link">← 返回主题</a>
        </main>
    </div>
</body>
</html>
