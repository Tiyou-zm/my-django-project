<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>删除主题</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #f5f5f7;
            color: #1d1d1f;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem;
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.07);
            margin-top: 2rem;
            margin-bottom: 2rem;
        }

        .header {
            text-align: center;
            padding: 2rem 0;
            border-bottom: 1px solid #d2d2d7;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #1d1d1f;
            margin: 0;
        }

        .warning-section {
            padding: 2rem 0;
            text-align: center;
        }

        .warning-message {
            background-color: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .warning-message p {
            margin: 0;
            color: #856404;
            font-weight: 500;
        }

        .topic-info {
            background-color: #f8f9fa;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
        }

        .topic-info h3 {
            margin: 0 0 0.5rem 0;
            color: #1d1d1f;
        }

        .topic-info p {
            margin: 0;
            color: #86868b;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .delete-btn {
            background-color: #ff3b30;
            color: #ffffff;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 4px rgba(255, 59, 48, 0.2);
        }

        .delete-btn:hover {
            background-color: #d63027;
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(255, 59, 48, 0.3);
        }

        .cancel-btn {
            background-color: #f5f5f7;
            color: #1d1d1f;
            padding: 0.75rem 1.5rem;
            border: 1px solid #d2d2d7;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .cancel-btn:hover {
            background-color: #e8e8ed;
        }

        .back-link {
            display: inline-block;
            color: #007aff;
            text-decoration: none;
            font-weight: 500;
            margin-top: 1rem;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .container {
                margin: 1rem;
                padding: 1.5rem;
            }

            h1 {
                font-size: 2rem;
            }

            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>删除主题</h1>
        </header>

        <main class="warning-section">
            <div class="warning-message">
                <p>⚠️ 警告：此操作无法撤销！删除主题将同时删除该主题下的所有条目。</p>
            </div>

            <div class="topic-info">
                <h3>{{ topic }}</h3>
                <p>创建时间: {{ topic.date_added|date:'M j, Y H:i' }}</p>
            </div>

            <form method="post">
                {% csrf_token %}
                <div class="action-buttons">
                    <button type="submit" class="delete-btn">确认删除</button>
                    <a href="{% url 'learning_logs:topic' topic.id %}" class="cancel-btn">取消</a>
                </div>
            </form>

            <a href="{% url 'learning_logs:topics' %}" class="back-link">← 返回主题列表</a>
        </main>
    </div>
</body>
</html>
